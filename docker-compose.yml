services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: promptgenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-promptgenie_dev}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: promptgenie-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Application
  app:
    image: nestjs-ready-app:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: promptgenie-app
    restart: unless-stopped
    ports:
      - '${PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
      # ── AI configuration injected at runtime ──────────────────────────────
      AI_ENABLED: ${AI_ENABLED:-true}
      TENSORFLOW_ENABLED: ${TENSORFLOW_ENABLED:-true}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
      AI_MAX_TOKENS: ${AI_MAX_TOKENS:-2048}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.7}
      AI_REQUEST_TIMEOUT: ${AI_REQUEST_TIMEOUT:-30000}
      AI_FRAUD_BLOCK_THRESHOLD: ${AI_FRAUD_BLOCK_THRESHOLD:-0.85}
      AI_FRAUD_REVIEW_THRESHOLD: ${AI_FRAUD_REVIEW_THRESHOLD:-0.55}
      AI_SURGE_MAX_MULTIPLIER: ${AI_SURGE_MAX_MULTIPLIER:-3.5}
      AI_PLATFORM_FEE_PCT: ${AI_PLATFORM_FEE_PCT:-8}
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./ml-models:/app/ml-models
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
