# ============================================
# Production Docker Compose — PROMPT Genie Backend
# Project name is pinned so container/volume/network names
# are stable regardless of the directory this file lives in.
# ============================================

name: promptgenie

services:
  # ---- Nginx Reverse Proxy ----
  nginx:
    image: nginx:1.25-alpine
    container_name: promptgenie-nginx
    restart: unless-stopped
    # Our entrypoint script checks whether the SSL cert exists and selects
    # the correct nginx config (HTTPS or HTTP-only bootstrap) before starting nginx.
    entrypoint: ["/bin/sh", "/etc/nginx/docker-entrypoint.sh"]
    environment:
      API_DOMAIN: ${API_DOMAIN}
      FRONTEND_DOMAIN: ${FRONTEND_DOMAIN}
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/docker-entrypoint.sh:/etc/nginx/docker-entrypoint.sh:ro
      - ./nginx/nginx.conf.template:/etc/nginx/nginx.conf.template:ro
      - ./nginx/nginx-http.conf.template:/etc/nginx/nginx-http.conf.template:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /opt/promptgenie/certbot/conf:/etc/letsencrypt:ro
      - /opt/promptgenie/certbot/www:/var/www/certbot:ro
    depends_on:
      app:
        condition: service_healthy
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost/health']
      interval: 30s
      timeout: 5s
      retries: 3

  # ---- Certbot (SSL auto-renewal) ----
  certbot:
    image: certbot/certbot:latest
    container_name: promptgenie-certbot
    volumes:
      - /opt/promptgenie/certbot/conf:/etc/letsencrypt
      - /opt/promptgenie/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - promptgenie-network

  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:15-alpine
    container_name: promptgenie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-promptgenie}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_INITDB_ARGS: '--auth-host=scram-sha-256'
    ports:
      - '127.0.0.1:${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-promptgenie}']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 1G

  # ---- Redis Cache ----
  redis:
    image: redis:7-alpine
    container_name: promptgenie-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    ports:
      - '127.0.0.1:${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    networks:
      - promptgenie-network
    healthcheck:
      # compose substitutes ${REDIS_PASSWORD} from .env at parse-time (list form)
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ---- NestJS Backend Application ----
  # context: '.' because this repo IS the NestJS application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    image: nestjs-ready-app:latest
    # Never pull from a registry — the image name is local-only.
    # Docker Compose will always build from the Dockerfile above.
    pull_policy: build
    container_name: promptgenie-app
    restart: unless-stopped
    expose:
      - '3000'
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - app_logs:/app/logs
      - app_uploads:/app/uploads
      - ./ml-models:/app/ml-models:ro
    networks:
      - promptgenie-network
    healthcheck:
      test: ['CMD', 'wget', '--quiet', '--tries=1', '--spider', 'http://localhost:3000/api/v1/health/live']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1.0'
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s

volumes:
  # Explicit names make volumes independent of the working directory path.
  postgres_data:
    driver: local
    name: promptgenie_postgres_data
  redis_data:
    driver: local
    name: promptgenie_redis_data
  app_logs:
    driver: local
    name: promptgenie_app_logs
  app_uploads:
    driver: local
    name: promptgenie_app_uploads

networks:
  promptgenie-network:
    driver: bridge
    name: promptgenie-network
